<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/static/flashmind-icon.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .container-main {
        width: 100vw;
        height: 100vh;
        background-image: url("../static/login-background.svg");
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: row;
        justify-content: space-evenly;
        flex-wrap: wrap;
      }
      .left-side {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        flex: 1;
        height: 100%;
        padding: 60px;
        color: white;
      }
      .left-side .badge-label {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 20px;
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .left-side h1 {
        font-size: 2.8rem;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 16px;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      }
      .left-side p {
        font-size: 1.1rem;
        opacity: 0.85;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
      }
      .right-side {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        height: 100%;
        padding: 40px;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 16px;
        width: 380px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .login-card img {
        height: 52px;
        margin-bottom: 8px;
      }
      .login-card h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 24px;
        color: #1a1a2e;
      }
      .login-card-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .login-card-form input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-size: 0.95rem;
        transition: border-color 0.2s;
        outline: none;
      }
      .login-card-form input:focus {
        border-color: #0d6efd;
      }
      .btn-login {
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 11px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .btn-login:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #aaa;
        font-size: 0.8rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e0e0e0;
      }
      .btn-signup {
        background: transparent;
        color: #0d6efd;
        border: 1.5px solid #0d6efd;
        border-radius: 10px;
        padding: 10px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .btn-signup:hover {
        background: #0d6efd;
        color: white;
      }
      .modal-content {
        border-radius: 16px;
        border: none;
      }
      .modal-body input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .modal-body input:focus {
        border-color: #0d6efd;
      }
    </style>
    <title>FlashMind — AI Flashcards</title>
  </head>
  <body>
    {% for category, message in get_flashed_messages(with_categories=True) %}
    <div
      class="alert alert-{{ category }} alert-dismissible fade show"
      role="alert"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        margin: 0;
        border-radius: 0;
      "
    >
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    <div class="container-main">
      <div class="left-side">
        <div class="badge-label">✦ AI-Powered Studying</div>
        <h1>Turn Your Notes<br />into Flashcards</h1>
        <p>
          Upload your PDFs and let AI do the work.<br />Study smarter, not
          harder.
        </p>
      </div>
      <div class="right-side">
        <div class="login-card">
          <img src="/static/flashmind-logo.svg" alt="FlashMind" />
          <h2>Welcome back</h2>
          <form class="login-card-form" method="POST">
            <input
              type="email"
              id="email-login"
              name="email-login"
              placeholder="Email"
              required
            />
            <input
              type="password"
              id="password-login"
              name="password-login"
              placeholder="Password"
              required
            />
            <button
              type="submit"
              name="login-button"
              id="login-button"
              class="btn-login"
            >
              Log In
            </button>
            <div class="divider">or</div>
            <button
              type="button"
              id="signup-button"
              class="btn-signup"
              data-bs-toggle="modal"
              data-bs-target="#centeredModal"
            >
              Create an account
            </button>
          </form>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="centeredModal"
      tabindex="-1"
      aria-labelledby="centeredModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="centeredModalLabel">
              Create your account
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body pt-3">
            <form method="POST">
              <input
                type="text"
                id="fname"
                name="fname"
                placeholder="First Name"
                required
              />
              <input
                type="text"
                id="lname"
                name="lname"
                placeholder="Last Name"
                required
              />
              <input
                type="email"
                id="email-signup"
                name="email-signup"
                placeholder="Email"
                required
              />
              <input
                type="password"
                id="password-signup"
                name="password-signup"
                placeholder="Password"
                required
              />
              <hr class="mt-1" />
              <button
                type="submit"
                name="signup-btn"
                class="btn btn-primary w-100"
                style="border-radius: 10px"
              >
                Sign Up
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
